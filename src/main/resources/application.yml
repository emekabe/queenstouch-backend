spring:
  application:
    name: queenstouch-backend

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:5MB}
      max-request-size: ${MAX_REQUEST_SIZE:5MB}

  mail:
    host: ${SMTP_HOST:smtp.mailtrap.io}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          ssl:
            enable: false

  ai:
    openai:
      api-key: ${GEMINI_API_KEY:changeme}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        options:
          model: ${GEMINI_MODEL:gemini-2.5-flash}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/queenstouch}

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  admin-secret: ${ADMIN_REGISTER_SECRET:default_dev_admin_secret_12345}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  mail-from-address: ${SMTP_USERNAME:}
  mail-personal: ${MAIL_PERSONAL:Queenstouch}
  jwt:
    secret: ${JWT_SECRET:veryLongSecretKeyForDevelopmentOnlyPleaseReplaceInProduction123456}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}        # 15 min
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}   # 7 days

  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}

  google-cloud-storage:
    project-id: ${GOOGLE_CLOUD_STORAGE_PROJECT_ID:}
    bucket: ${GOOGLE_CLOUD_STORAGE_BUCKET:}
    credentials-base64: ${GOOGLE_CLOUD_STORAGE_CREDENTIALS_BASE64:}
